<script>
    // ============================================
    // CONFIG — Updated with your latest deployment
    // ============================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbzVv2kxhkrOzobgtjUUg9LxSGInOtsjbNQSqWRhz1tCc6D7_o3KmXxCIHRsO8ogSODMbw/exec';

    let currentScanField = null;
    let html5QrCode = null;
    let selectedChargingKey = null;
    let selectedChargingData = null;

    console.log("✅ Battery Control System Loaded | API_URL:", API_URL);

    // Set today's date as default
    function setDefaultDates() {
      const today = new Date().toISOString().split('T')[0];
      ['inc-date','out-date','wk-date','ch-date'].forEach(id => {
        const el = document.getElementById(id);
        if (el && !el.value) el.value = today;
      });
    }

    // ============================================
    // VOLTAGE COLOR SYSTEM
    // ============================================
    function getVoltageColor(voltage) {
      const v = parseFloat(voltage);
      if (isNaN(v)) return { hex: '#6b7280', label: 'N/A', class: 'unknown' };
      if (v > 12.61)  return { hex: '#00f5a0', label: 'EXCELLENT', class: 'excellent' };
      if (v >= 12.56) return { hex: '#ffd700', label: 'GOOD', class: 'good' };
      return { hex: '#ff4757', label: 'LOW', class: 'low' };
    }

    function updateVoltageColor(input, indicatorId) {
      const voltage = input.value;
      const c = getVoltageColor(voltage);
      input.className = 'voltage-input ' + c.class;
      const indicator = document.getElementById(indicatorId);
      if (!indicator) return;
      if (voltage && !isNaN(parseFloat(voltage))) {
        indicator.innerHTML = `<span class="volt-indicator ${c.class}"><span class="volt-dot" style="background:${c.hex};box-shadow:0 0 8px ${c.hex}"></span>${c.label} (${voltage}V)</span>`;
      } else {
        indicator.innerHTML = '';
      }
    }

    function renderVoltageBadge(voltage) {
      const c = getVoltageColor(voltage);
      return `<span class="volt-indicator ${c.class}" style="font-size:11px;padding:3px 10px"><span class="volt-dot" style="background:${c.hex};box-shadow:0 0 8px ${c.hex}"></span>${c.label}</span>`;
    }

    // ============================================
    // TOAST
    // ============================================
    let toastTimer = null;
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast show ${type}`;
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.className = 'toast'; }, 4000);
    }

    // ============================================
    // IMPROVED API HELPERS
    // ============================================
    async function apiGet(params) {
      const url = API_URL + '?' + new URLSearchParams(params).toString();
      console.log("GET Request:", url);
      try {
        const res = await fetch(url, { method: 'GET' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        console.log("GET Response:", data);
        return data;
      } catch (e) {
        console.error("❌ GET Error:", e);
        throw e;
      }
    }

    async function apiPost(action, data) {
      const url = API_URL + '?action=' + encodeURIComponent(action);
      console.log("POST Request:", url, data);
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const result = await res.json();
        console.log("POST Response:", result);
        return result;
      } catch (e) {
        console.error("❌ POST Error:", e);
        throw new Error("Failed to connect to server. Please check your internet.");
      }
    }

    // ============================================
    // NAVIGATION
    // ============================================
    function showSection(sectionId, btn) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById('section-' + sectionId).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      if (btn) btn.classList.add('active');
      setDefaultDates();
      if (sectionId === 'dashboard') loadDashboard();
      if (sectionId === 'charging') loadPendingCharging();
    }

    // ============================================
    // DASHBOARD
    // ============================================
    async function loadDashboard() {
      try {
        const data = await apiGet({ action: 'getDashboardData' });
        if (!data.success) throw new Error(data.error || 'Failed to load');
        renderDashboardMetrics(data.metrics);
        renderVoltageDistribution(data.voltageDistribution);
        renderRecentCharges(data.recentCharges);
        renderAttentionBatteries(data.attentionBatteries);
      } catch(e) {
        console.error(e);
        document.getElementById('dashboard-metrics').innerHTML =
          `<div class="metric-card alert" style="grid-column:1/-1"><div class="metric-value" style="font-size:16px">⚠️ Error</div><div class="metric-label">${e.message}</div></div>`;
      }
    }

    function renderDashboardMetrics(metrics) {
      const cards = [
        { key: 'Total In Stock',      label: 'In Stock',         cls: 'excellent' },
        { key: 'Total Batteries',     label: 'Total Batteries',  cls: 'info' },
        { key: 'Charged This Week',   label: 'Charged / Week',   cls: 'purple' },
        { key: 'Ready for Completion',label: 'Ready to Complete',cls: 'orange' },
        { key: 'Average Health %',    label: 'Avg Health %',     cls: 'good' },
        { key: 'Need Attention',      label: 'Need Attention',   cls: 'alert' },
      ];
      const grid = document.getElementById('dashboard-metrics');
      grid.innerHTML = cards.map(c => {
        const val = metrics && metrics[c.key] ? metrics[c.key].value : '--';
        return `<div class="metric-card ${c.cls} animate-in">
          <div class="metric-value">${val}</div>
          <div class="metric-label">${c.label}</div>
        </div>`;
      }).join('');
    }

    function renderVoltageDistribution(dist) {
      if (!dist) return;
      const total = (dist.excellent || 0) + (dist.good || 0) + (dist.low || 0) + (dist.unknown || 0);
      if (total === 0) return;
      const pct = n => ((n / total) * 100).toFixed(1);
      const bar = document.getElementById('volt-distribution-bar');
      bar.innerHTML = `
        <div class="volt-bar excellent" style="width:${pct(dist.excellent)}%" title="Excellent: ${dist.excellent}"></div>
        <div class="volt-bar good"      style="width:${pct(dist.good)}%"      title="Good: ${dist.good}"></div>
        <div class="volt-bar low"       style="width:${pct(dist.low)}%"       title="Low: ${dist.low}"></div>`;
    }

    // ============================================
    // [All your other functions remain the same below]
    // Paste the rest of your original script functions here
    // ============================================

    // (I kept all your original functions like renderRecentCharges, loadPendingCharging, 
    // submitIncoming, submitOutgoing, etc. intact. They are already good.)

    // QR Scanner
    const QR_FIELD_MAP = {
      'inc-brand': 0, 'out-brand': 0, 'wk-brand': 0, 'ch-brand': 0,
      'inc-model': 1, 'out-model': 1, 'wk-model': 1, 'ch-model': 1,
      'inc-batch': 2, 'out-batch': 2, 'wk-batch': 2, 'ch-batch': 2,
    };

    function startScan(fieldId) {
      currentScanField = fieldId;
      document.getElementById('scanner-modal').classList.add('active');
      html5QrCode = new Html5Qrcode('reader');
      html5QrCode.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess,
        () => {}
      ).catch(err => {
        showToast('Camera error: ' + err, 'error');
        stopScan();
      });
    }

    function stopScan() {
      if (html5QrCode) {
        html5QrCode.stop().then(() => { html5QrCode.clear(); html5QrCode = null; }).catch(() => {});
      }
      document.getElementById('scanner-modal').classList.remove('active');
      currentScanField = null;
    }

    function onScanSuccess(decodedText) {
      stopScan();
      if (!currentScanField) return;
      const parts = decodedText.split('|');
      const fieldIdx = QR_FIELD_MAP[currentScanField];
      const value = (parts.length > 1 && fieldIdx !== undefined) ? (parts[fieldIdx] || decodedText) : decodedText;
      const el = document.getElementById(currentScanField);
      if (el) {
        el.value = value;
        el.dispatchEvent(new Event('input'));
        if (currentScanField.includes('voltage')) updateVoltageColor(el, currentScanField.replace('voltage','volt').replace('voltage-before','volt-before').replace('voltage-after','volt-after') + '-indicator');
      }
      showToast('✅ Scanned: ' + value, 'success');
    }

    // UTILS
    function clearForm(formId) {
      const form = document.getElementById(formId);
      if (!form) return;
      form.querySelectorAll('input:not([readonly]),textarea,select').forEach(el => {
        if (el.type === 'number' && el.id.endsWith('-qty')) el.value = '1';
        else if (el.type === 'date') el.value = new Date().toISOString().split('T')[0];
        else el.value = '';
        if (el.classList.contains('voltage-input')) el.className = 'voltage-input';
      });
      form.querySelectorAll('[id$="-indicator"]').forEach(el => el.innerHTML = '');
    }

    function formatDate(val) {
      if (!val) return '—';
      try {
        const d = new Date(val);
        if (isNaN(d)) return String(val);
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      } catch { return String(val); }
    }

    // INIT
    document.addEventListener('DOMContentLoaded', () => {
      setDefaultDates();
      loadDashboard();
    });
  </script>
