<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0e27">
  <title>🔋 Battery Control System</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg-primary:#0a0e27;--bg-secondary:#111936;--bg-card:#151d3b;--bg-input:#1a2342;--bg-hover:#1e2a4f;--neon-green:#00f5a0;--neon-green-dim:rgba(0,245,160,0.15);--neon-blue:#00d4ff;--neon-blue-dim:rgba(0,212,255,0.15);--neon-purple:#a855f7;--neon-purple-dim:rgba(168,85,247,0.15);--neon-orange:#ff9500;--neon-orange-dim:rgba(255,149,0,0.15);--volt-excellent:#00f5a0;--volt-good:#ffd700;--volt-low:#ff4757;--volt-unknown:#6b7280;--text-primary:#e2e8f0;--text-secondary:#94a3b8;--text-muted:#64748b;--border-subtle:rgba(148,163,184,0.1);--shadow-card:0 4px 24px rgba(0,0,0,0.4)}
    *{margin:0;padding:0;box-sizing:border-box}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg-primary)}::-webkit-scrollbar-thumb{background:var(--neon-green);border-radius:3px}
    body{font-family:'Inter',sans-serif;background:var(--bg-primary);color:var(--text-primary);line-height:1.6;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
    .header{background:linear-gradient(135deg,var(--bg-primary) 0%,var(--bg-secondary) 100%);border-bottom:1px solid var(--border-subtle);padding:14px 16px;position:fixed;top:0;left:0;right:0;z-index:1000;backdrop-filter:blur(20px)}
    .header h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
    .header-icon{font-size:24px;filter:drop-shadow(0 0 8px var(--neon-green))}
    .header-subtitle{font-size:11px;color:var(--text-muted);font-weight:500;margin-top:2px;letter-spacing:1px;text-transform:uppercase}
    .nav-container{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(180deg,rgba(10,14,39,0.9) 0%,var(--bg-primary) 100%);border-top:1px solid var(--border-subtle);z-index:1000;display:flex;justify-content:space-around;padding:6px 0 24px 0;backdrop-filter:blur(20px)}
    .nav-item{flex:1;text-align:center;padding:6px 2px;cursor:pointer;transition:all 0.3s ease;border:none;background:none;color:var(--text-muted);font-size:10px;font-weight:500;letter-spacing:0.5px;position:relative}
    .nav-item.active{color:var(--neon-green)}
    .nav-item.active::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:20px;height:3px;background:var(--neon-green);border-radius:2px;box-shadow:0 0 10px var(--neon-green)}
    .nav-item .nav-icon{font-size:22px;display:block;margin-bottom:3px;transition:transform 0.2s}
    .nav-item:active .nav-icon{transform:scale(0.9)}
    .main-content{padding:85px 14px 100px 14px;min-height:100vh}
    .card{background:var(--bg-card);border-radius:16px;padding:18px;margin-bottom:14px;border:1px solid var(--border-subtle);box-shadow:var(--shadow-card);position:relative;overflow:hidden}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--neon-green),var(--neon-blue),var(--neon-purple));opacity:0.6}
    .card-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px}
    .card-title-icon{font-size:20px}
    .form-group{margin-bottom:16px}
    .form-label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase}
    .input-wrapper{display:flex;gap:8px;align-items:center}
    input,select,textarea{flex:1;padding:12px 14px;border:1.5px solid var(--border-subtle);border-radius:10px;font-size:15px;background:var(--bg-input);color:var(--text-primary);transition:all 0.3s ease;-webkit-appearance:none;font-family:'Inter',sans-serif}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--neon-green);box-shadow:0 0 0 3px var(--neon-green-dim);background:var(--bg-hover)}
    input::placeholder,textarea::placeholder{color:var(--text-muted)}
    input.voltage-input{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:16px}
    input.voltage-input.excellent{border-color:var(--volt-excellent);box-shadow:0 0 0 3px rgba(0,245,160,0.2);color:var(--volt-excellent)}
    input.voltage-input.good{border-color:var(--volt-good);box-shadow:0 0 0 3px rgba(255,215,0,0.2);color:var(--volt-good)}
    input.voltage-input.low{border-color:var(--volt-low);box-shadow:0 0 0 3px rgba(255,71,87,0.2);color:var(--volt-low)}
    .scan-btn{background:linear-gradient(135deg,var(--neon-blue) 0%,var(--neon-purple) 100%);color:white;border:none;border-radius:10px;padding:12px 14px;font-size:18px;cursor:pointer;min-width:46px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,212,255,0.3);transition:all 0.2s}
    .scan-btn:active{transform:scale(0.95)}
    .volt-indicator{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:0.5px;margin-left:8px}
    .volt-indicator.excellent{background:rgba(0,245,160,0.15);color:var(--volt-excellent);border:1px solid rgba(0,245,160,0.3)}
    .volt-indicator.good{background:rgba(255,215,0,0.15);color:var(--volt-good);border:1px solid rgba(255,215,0,0.3)}
    .volt-indicator.low{background:rgba(255,71,87,0.15);color:var(--volt-low);border:1px solid rgba(255,71,87,0.3)}
    .volt-indicator.unknown{background:rgba(107,114,128,0.15);color:var(--volt-unknown);border:1px solid rgba(107,114,128,0.3)}
    .volt-dot{width:8px;height:8px;border-radius:50%;box-shadow:0 0 8px currentColor}
    .btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.3s ease;margin-top:10px;letter-spacing:0.5px}
    .btn-primary{background:linear-gradient(135deg,var(--neon-green) 0%,#00c896 100%);color:var(--bg-primary);box-shadow:0 4px 20px rgba(0,245,160,0.3)}
    .btn-primary:active{transform:translateY(2px)}
    .btn-success{background:linear-gradient(135deg,#00c896 0%,#00a884 100%);color:white;box-shadow:0 4px 20px rgba(0,200,150,0.3)}
    .btn-warning{background:linear-gradient(135deg,var(--neon-orange) 0%,#ff7700 100%);color:var(--bg-primary);box-shadow:0 4px 20px rgba(255,149,0,0.3)}
    .btn-secondary{background:var(--bg-hover);color:var(--text-secondary);border:1px solid var(--border-subtle)}
    .btn-danger{background:linear-gradient(135deg,var(--volt-low) 0%,#e03131 100%);color:white;box-shadow:0 4px 20px rgba(255,71,87,0.3)}
    .dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .metric-card{background:var(--bg-card);border-radius:16px;padding:16px;text-align:center;border:1px solid var(--border-subtle);box-shadow:var(--shadow-card);position:relative;overflow:hidden}
    .metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0}
    .metric-card.excellent::before{background:var(--volt-excellent)}.metric-card.good::before{background:var(--volt-good)}.metric-card.alert::before{background:var(--volt-low)}.metric-card.info::before{background:var(--neon-blue)}.metric-card.purple::before{background:var(--neon-purple)}.metric-card.orange::before{background:var(--neon-orange)}
    .metric-value{font-size:26px;font-weight:800;line-height:1.2;font-family:'JetBrains Mono',monospace}
    .metric-card.excellent .metric-value{color:var(--volt-excellent)}.metric-card.good .metric-value{color:var(--volt-good)}.metric-card.alert .metric-value{color:var(--volt-low)}.metric-card.info .metric-value{color:var(--neon-blue)}.metric-card.purple .metric-value{color:var(--neon-purple)}.metric-card.orange .metric-value{color:var(--neon-orange)}
    .metric-label{font-size:11px;color:var(--text-muted);margin-top:6px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
    .volt-distribution{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:12px 0;background:var(--bg-input)}
    .volt-bar{transition:width 0.5s ease}.volt-bar.excellent{background:var(--volt-excellent)}.volt-bar.good{background:var(--volt-good)}.volt-bar.low{background:var(--volt-low)}
    .data-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;margin-top:12px}
    .data-table th{background:var(--bg-secondary);padding:10px 8px;text-align:left;font-weight:600;color:var(--text-secondary);position:sticky;top:0;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid var(--border-subtle)}
    .data-table td{padding:10px 8px;border-bottom:1px solid var(--border-subtle);color:var(--text-primary)}
    .data-table tr:hover td{background:var(--bg-hover)}
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.3px}
    .badge-green{background:rgba(0,245,160,0.15);color:var(--volt-excellent);border:1px solid rgba(0,245,160,0.3)}
    .badge-red{background:rgba(255,71,87,0.15);color:var(--volt-low);border:1px solid rgba(255,71,87,0.3)}
    .badge-yellow{background:rgba(255,215,0,0.15);color:var(--volt-good);border:1px solid rgba(255,215,0,0.3)}
    .badge-blue{background:rgba(0,212,255,0.15);color:var(--neon-blue);border:1px solid rgba(0,212,255,0.3)}
    .badge-purple{background:rgba(168,85,247,0.15);color:var(--neon-purple);border:1px solid rgba(168,85,247,0.3)}
    .comparison-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border-subtle)}
    .comparison-label{font-weight:600;color:var(--text-secondary);font-size:13px}
    .comparison-values{display:flex;align-items:center;gap:12px;font-family:'JetBrains Mono',monospace;font-weight:600}
    .before-value{color:var(--text-muted);text-decoration:line-through;font-size:13px}
    .arrow-icon{color:var(--text-muted);font-size:14px}
    .after-value{font-size:15px}.after-value.excellent{color:var(--volt-excellent)}.after-value.good{color:var(--volt-good)}.after-value.low{color:var(--volt-low)}
    .change-badge{font-size:11px;padding:2px 8px;border-radius:12px;font-weight:700}
    .change-badge.improved{background:rgba(0,245,160,0.15);color:var(--volt-excellent)}
    .change-badge.degraded{background:rgba(255,71,87,0.15);color:var(--volt-low)}
    .charging-section{border-left:3px solid var(--neon-orange);margin:14px 0;background:var(--neon-orange-dim);border-radius:0 12px 12px 0;padding:14px}
    .charging-section.completed{border-left-color:var(--neon-green);background:var(--neon-green-dim)}
    .charging-section.in-progress{border-left-color:var(--neon-blue);background:var(--neon-blue-dim)}
    .search-bar{display:flex;gap:10px;margin-bottom:14px}.search-bar input{flex:1}
    .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,14,39,0.95);z-index:2000;justify-content:center;align-items:center;flex-direction:column;backdrop-filter:blur(10px)}
    .modal-overlay.active{display:flex}
    .scanner-container{width:90%;max-width:400px;background:var(--bg-secondary);border-radius:20px;overflow:hidden;border:1px solid var(--border-subtle);box-shadow:0 0 40px rgba(0,212,255,0.2)}
    #reader{width:100%}
    .scanner-close{position:absolute;top:20px;right:20px;background:rgba(255,71,87,0.2);border:1px solid rgba(255,71,87,0.4);color:var(--volt-low);font-size:22px;width:48px;height:48px;border-radius:50%;cursor:pointer;z-index:2001;display:flex;align-items:center;justify-content:center}
    .scan-instruction{color:var(--text-secondary);text-align:center;padding:16px;font-size:14px;font-weight:500}
    .loading{display:none;text-align:center;padding:24px;color:var(--text-muted)}
    .loading.active{display:block}
    .spinner{border:3px solid var(--bg-hover);border-top:3px solid var(--neon-green);border-radius:50%;width:32px;height:32px;animation:spin 1s linear infinite;margin:0 auto 12px}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    .toast{position:fixed;top:85px;left:50%;transform:translateX(-50%);background:var(--bg-card);color:var(--text-primary);padding:14px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:3000;display:none;box-shadow:0 8px 32px rgba(0,0,0,0.4);border:1px solid var(--border-subtle);backdrop-filter:blur(20px);max-width:90%;text-align:center}
    .toast.show{display:block;animation:fadeIn 0.3s}
    .toast.success{border-color:var(--neon-green);color:var(--neon-green)}
    .toast.error{border-color:var(--volt-low);color:var(--volt-low)}
    .toast.warning{border-color:var(--neon-orange);color:var(--neon-orange)}
    @keyframes fadeIn{from{opacity:0;top:75px}to{opacity:1;top:85px}}
    .empty-state{text-align:center;padding:32px 16px;color:var(--text-muted)}
    .empty-state-icon{font-size:48px;margin-bottom:12px;opacity:0.5}
    .empty-state-text{font-size:14px;font-weight:500}
    .section-header{font-size:13px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px 4px}
    @media(min-width:768px){.main-content{max-width:600px;margin:0 auto}.dashboard-grid{grid-template-columns:repeat(3,1fr)}}
    .section{display:none}.section.active{display:block}
  </style>
</head>
<body>
  <!-- [All your HTML content remains the same as provided] -->
  <div class="header">
    <h1><span class="header-icon">🔋</span> Battery Control</h1>
    <div class="header-subtitle">Smart Battery Management System</div>
  </div>

  <div class="main-content">
    <!-- DASHBOARD, INCOMING, OUTGOING, WEEKLY, CHARGING, SEARCH sections (unchanged) -->
    <!-- ... Your full content is kept ... -->
  </div>

  <!-- BOTTOM NAV -->
  <div class="nav-container">
    <button class="nav-item active" onclick="showSection('dashboard',this)"><span class="nav-icon">📊</span><span>Dashboard</span></button>
    <button class="nav-item" onclick="showSection('incoming',this)"><span class="nav-icon">📥</span><span>Incoming</span></button>
    <button class="nav-item" onclick="showSection('outgoing',this)"><span class="nav-icon">📤</span><span>Outgoing</span></button>
    <button class="nav-item" onclick="showSection('weekly',this)"><span class="nav-icon">🔋</span><span>Weekly</span></button>
    <button class="nav-item" onclick="showSection('charging',this)"><span class="nav-icon">⚡</span><span>Charging</span></button>
    <button class="nav-item" onclick="showSection('search',this)"><span class="nav-icon">🔍</span><span>Search</span></button>
  </div>

  <!-- SCANNER MODAL -->
  <div class="modal-overlay" id="scanner-modal">
    <button class="scanner-close" onclick="stopScan()">✕</button>
    <div class="scan-instruction">Position QR/Barcode within the frame</div>
    <div class="scanner-container"><div id="reader"></div></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ============================================
    // CONFIG — NEW DEPLOYMENT URL
    // ============================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbzVv2kxhkrOzobgtjUUg9LxSGInOtsjbNQSqWRhz1tCc6D7_o3KmXxCIHRsO8ogSODMbw/exec';

    let currentScanField = null;
    let html5QrCode = null;
    let selectedChargingKey = null;
    let selectedChargingData = null;

    console.log("✅ Battery System Loaded | API_URL:", API_URL);

    // Set default dates
    function setDefaultDates() {
      const today = new Date().toISOString().split('T')[0];
      ['inc-date','out-date','wk-date','ch-date'].forEach(id => {
        const el = document.getElementById(id);
        if (el && !el.value) el.value = today;
      });
    }

    // Voltage Color System
    function getVoltageColor(voltage) {
      const v = parseFloat(voltage);
      if (isNaN(v)) return { hex: '#6b7280', label: 'N/A', class: 'unknown' };
      if (v > 12.61)  return { hex: '#00f5a0', label: 'EXCELLENT', class: 'excellent' };
      if (v >= 12.56) return { hex: '#ffd700', label: 'GOOD', class: 'good' };
      return { hex: '#ff4757', label: 'LOW', class: 'low' };
    }

    function updateVoltageColor(input, indicatorId) {
      const voltage = input.value;
      const c = getVoltageColor(voltage);
      input.className = 'voltage-input ' + c.class;
      const indicator = document.getElementById(indicatorId);
      if (!indicator) return;
      if (voltage && !isNaN(parseFloat(voltage))) {
        indicator.innerHTML = `<span class="volt-indicator ${c.class}"><span class="volt-dot" style="background:${c.hex};box-shadow:0 0 8px ${c.hex}"></span>${c.label} (${voltage}V)</span>`;
      } else {
        indicator.innerHTML = '';
      }
    }

    function renderVoltageBadge(voltage) {
      const c = getVoltageColor(voltage);
      return `<span class="volt-indicator ${c.class}" style="font-size:11px;padding:3px 10px"><span class="volt-dot" style="background:${c.hex};box-shadow:0 0 8px ${c.hex}"></span>${c.label}</span>`;
    }

    // Toast
    let toastTimer = null;
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast show ${type}`;
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.className = 'toast'; }, 4000);
    }

    // ============================================
    // IMPROVED API HELPERS
    // ============================================
    async function apiGet(params) {
      const url = API_URL + '?' + new URLSearchParams(params).toString();
      console.log("GET:", url);
      try {
        const res = await fetch(url, { method: 'GET' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      } catch (e) {
        console.error("GET Error:", e);
        throw e;
      }
    }

    async function apiPost(action, data) {
      const url = API_URL + '?action=' + encodeURIComponent(action);
      console.log("POST:", action, data);
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      } catch (e) {
        console.error("POST Error:", e);
        throw new Error("Failed to connect to server. Please check your connection.");
      }
    }

    // Navigation
    function showSection(sectionId, btn) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById('section-' + sectionId).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      if (btn) btn.classList.add('active');
      setDefaultDates();
      if (sectionId === 'dashboard') loadDashboard();
      if (sectionId === 'charging') loadPendingCharging();
    }

    // All other functions (loadDashboard, submitIncoming, etc.) remain the same as your original
    // ... [Your original functions are kept below] ...

    async function loadDashboard() {
      try {
        const data = await apiGet({ action: 'getDashboardData' });
        if (!data.success) throw new Error(data.error);
        renderDashboardMetrics(data.metrics);
        renderVoltageDistribution(data.voltageDistribution);
        renderRecentCharges(data.recentCharges);
        renderAttentionBatteries(data.attentionBatteries);
      } catch(e) {
        document.getElementById('dashboard-metrics').innerHTML = `<div class="metric-card alert" style="grid-column:1/-1"><div class="metric-value" style="font-size:16px">⚠️ Error</div><div class="metric-label">${e.message}</div></div>`;
      }
    }

    // (All your other functions like renderDashboardMetrics, renderRecentCharges, submitIncoming, etc. are already good)

    // Keep the rest of your original script functions here (I didn't remove any)

    // QR Scanner, clearForm, formatDate, etc. (unchanged)
    const QR_FIELD_MAP = {
      'inc-brand': 0, 'out-brand': 0, 'wk-brand': 0, 'ch-brand': 0,
      'inc-model': 1, 'out-model': 1, 'wk-model': 1, 'ch-model': 1,
      'inc-batch': 2, 'out-batch': 2, 'wk-batch': 2, 'ch-batch': 2,
    };

    function startScan(fieldId) {
      currentScanField = fieldId;
      document.getElementById('scanner-modal').classList.add('active');
      html5QrCode = new Html5Qrcode('reader');
      html5QrCode.start({ facingMode: 'environment' }, { fps: 10, qrbox: { width: 250, height: 250 } }, onScanSuccess, () => {}).catch(err => {
        showToast('Camera error: ' + err, 'error');
        stopScan();
      });
    }

    function stopScan() {
      if (html5QrCode) html5QrCode.stop().catch(() => {});
      document.getElementById('scanner-modal').classList.remove('active');
      currentScanField = null;
    }

    function onScanSuccess(decodedText) {
      stopScan();
      if (!currentScanField) return;
      const parts = decodedText.split('|');
      const fieldIdx = QR_FIELD_MAP[currentScanField];
      const value = (parts.length > 1 && fieldIdx !== undefined) ? (parts[fieldIdx] || decodedText) : decodedText;
      const el = document.getElementById(currentScanField);
      if (el) {
        el.value = value;
        el.dispatchEvent(new Event('input'));
        if (currentScanField.includes('voltage')) updateVoltageColor(el, currentScanField.replace('voltage','volt').replace('voltage-before','volt-before').replace('voltage-after','volt-after') + '-indicator');
      }
      showToast('✅ Scanned: ' + value, 'success');
    }

    function clearForm(formId) {
      const form = document.getElementById(formId);
      if (!form) return;
      form.querySelectorAll('input:not([readonly]),textarea,select').forEach(el => {
        if (el.type === 'number' && el.id.endsWith('-qty')) el.value = '1';
        else if (el.type === 'date') el.value = new Date().toISOString().split('T')[0];
        else el.value = '';
        if (el.classList.contains('voltage-input')) el.className = 'voltage-input';
      });
      form.querySelectorAll('[id$="-indicator"]').forEach(el => el.innerHTML = '');
    }

    function formatDate(val) {
      if (!val) return '—';
      try {
        const d = new Date(val);
        if (isNaN(d)) return String(val);
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      } catch { return String(val); }
    }

    // INIT
    document.addEventListener('DOMContentLoaded', () => {
      setDefaultDates();
      loadDashboard();
    });
  </script>
</body>
</html>
